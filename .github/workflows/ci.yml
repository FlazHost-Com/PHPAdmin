name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo,pdo_sqlite,gd
      - run: composer install --no-interaction --prefer-dist
      - run: ./vendor/bin/phpstan analyse src --level=6 --no-progress
      - run: ./vendor/bin/phpcs src --standard=phpcs.xml -q
      - run: ./vendor/bin/phpunit --testdox
        env:
          APP_ENV: testing
          DB_DRIVER: sqlite
          DB_DATABASE: ":memory:"
          SESSION_SECRET: test-session-secret-min-32-chars-ok
          JWT_SECRET: test-jwt-secret-min-32-chars-okay
